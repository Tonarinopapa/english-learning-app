<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英語チャンク学習アプリ</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --linking-bg: #fef3c7;
      --linking-border: #f59e0b;
      --linking-text: #92400e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 760px;
      margin: 0 auto 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    /* テーマ入力 */
    .theme-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .theme-input {
      flex: 1;
      min-width: 180px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .theme-input:focus { border-color: var(--primary); }
    .theme-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .theme-tag {
      background: #ede9fe;
      color: var(--primary);
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .theme-tag:hover { background: #c7d2fe; }
    /* ボタン */
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text);
    }
    .btn-secondary:hover { background: #e2e8f0; }
    /* 英文表示エリア */
    .sentence-area {
      font-size: 1.35rem;
      line-height: 1.9;
      letter-spacing: 0.01em;
      min-height: 60px;
      padding: 4px 0;
    }
    .sentence-area .word { display: inline; }
    /* リンキングハイライト */
    .linking {
      background: var(--linking-bg);
      border-bottom: 2px solid var(--linking-border);
      color: var(--linking-text);
      border-radius: 3px;
      padding: 0 2px;
      cursor: pointer;
      position: relative;
      font-weight: 600;
    }
    .ja-translation {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
      line-height: 1.6;
    }
    /* チャンク解説 */
    .chunks-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .chunk-badge {
      background: #ede9fe;
      color: var(--primary);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    /* リンキング解説カード */
    .linking-list { display: flex; flex-direction: column; gap: 10px; }
    .linking-item {
      background: var(--linking-bg);
      border-left: 4px solid var(--linking-border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .linking-item .linking-phrase {
      font-size: 1rem;
      font-weight: 700;
      color: var(--linking-text);
      margin-bottom: 3px;
    }
    .linking-item .linking-phonetic {
      font-size: 0.85rem;
      color: #78350f;
      margin-bottom: 2px;
    }
    .linking-item .linking-desc {
      font-size: 0.85rem;
      color: var(--text);
    }
    /* プレーヤー */
    .player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .play-btn:hover { background: #4338ca; }
    .play-btn:active { transform: scale(0.93); }
    .speed-group {
      display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px;
    }
    .speed-label {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex; justify-content: space-between;
    }
    .speed-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
    }
    .repeat-group {
      display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--muted);
    }
    .repeat-group input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    /* ステータス */
    .status-bar {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 20px;
    }
    /* ローディング */
    .loading {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 24px 0;
      font-size: 0.95rem;
    }
    /* 履歴 */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: #ede9fe; }
    .history-en { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .history-theme {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    /* モーダル */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-size: 1rem; margin-bottom: 12px; color: var(--primary); }
    .modal-close {
      float: right; background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: var(--muted); margin-top: -4px;
    }
    @media (max-width: 500px) {
      .sentence-area { font-size: 1.1rem; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <h1>🗣 英語チャンク学習アプリ</h1>
  <p class="subtitle">代表的なチャンク × リンキングで自然な英語を身につけよう</p>

  <!-- テーマ設定 -->
  <div class="card">

    <div class="theme-row">

      <button class="btn btn-primary" id="generateBtn">✨ 英文を生成</button>
    </div>
    <div class="theme-tags" id="themeTags">
      <button class="theme-tag" data-theme="カフェ">☕ カフェ</button>
      <button class="theme-tag" data-theme="空港">✈️ 空港</button>
      <button class="theme-tag" data-theme="ショッピング">🛍 ショッピング</button>
      <button class="theme-tag" data-theme="ビジネス会議">💼 ビジネス会議</button>
      <button class="theme-tag" data-theme="レストラン">🍽 レストラン</button>
      <button class="theme-tag" data-theme="ホテル">🏨 ホテル</button>
      <button class="theme-tag" data-theme="日常会話">💬 日常会話</button>
      <button class="theme-tag" data-theme="医療・病院">🏥 医療</button>
      <button class="theme-tag" data-theme="観光">🗺 観光</button>
    </div>
  </div>

  <!-- 英文表示 -->
  <div class="card" id="sentenceCard">
    <div class="section-title">生成された英文</div>
    <div class="sentence-area" id="sentenceDisplay">
      <div class="empty-state">上のボタンで英文を生成してください</div>
    </div>
    <div class="ja-translation" id="jaTranslation"></div>
  </div>

  <!-- 音声プレーヤー -->
  <div class="card">
    <div class="section-title">音声再生</div>
    <div class="player-row">
      <button class="play-btn" id="playBtn" title="再生">▶</button>
      <div class="speed-group">
        <div class="speed-label">
          <span>スピード</span>
          <span id="speedVal">1.0×</span>
        </div>
        <input class="speed-slider" id="speedSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
      <div class="repeat-group">
        <input type="checkbox" id="repeatCheck" />
        <label for="repeatCheck">リピート再生</label>
      </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <!-- チャンク解説 -->
  <div class="card" id="chunkCard">
    <div class="section-title">使われているチャンク</div>
    <div id="chunkDisplay">
      <div class="empty-state">英文を生成するとチャンクが表示されます</div>
    </div>
  </div>

  <!-- リンキング解説 -->
  <div class="card" id="linkingCard">
    <div class="section-title">🔗 リンキング解説</div>
    <div id="linkingDisplay">
      <div class="empty-state">英文を生成するとリンキング解説が表示されます</div>
    </div>
  </div>

  <!-- 生成履歴 -->
  <div class="card">
    <div class="section-title">📚 生成履歴（クリックで再表示）</div>
    <div id="historyDisplay">
      <div class="empty-state">まだ履歴がありません</div>
    </div>
  </div>

  <!-- リンキング詳細モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
    </div>
  </div>

          { phrase: "it_okay", display: "it okay", phonetic: "/ɪtəʊkeɪ/", desc: "「it」末尾 /t/ が弱化してフラップ音になり「okay」/oʊkeɪ/ とつながり /ɪɾoʊkeɪ/ のように聞こえる。" },
          { phrase: "take_photos", display: "take photos", phonetic: "/teɪkˈfoʊtəʊz/", desc: "「take」末尾 /k/ と「photos」の /f/ が連なり /k/ が軽く発音される。" }
        ]
      }
    ]
  };

  const THEMES = Object.keys(DB);

  // =====================================================================
  // 状態管理
  // =====================================================================
  let currentSentence = null;  // { en, ja, chunks, linkings, theme }
  let history = [];
  let utterance = null;
  let speaking = false;
  let repeatMode = false;

  // =====================================================================
  // DOM 参照
  // =====================================================================
  const themeInput   = document.getElementById('themeInput');
  const generateBtn  = document.getElementById('generateBtn');
  const sentenceDisplay = document.getElementById('sentenceDisplay');
  const jaTranslation   = document.getElementById('jaTranslation');
  const chunkDisplay    = document.getElementById('chunkDisplay');
  const linkingDisplay  = document.getElementById('linkingDisplay');
  const historyDisplay  = document.getElementById('historyDisplay');
  const playBtn         = document.getElementById('playBtn');
  const speedSlider     = document.getElementById('speedSlider');
  const speedVal        = document.getElementById('speedVal');
  const statusBar       = document.getElementById('statusBar');
  const repeatCheck     = document.getElementById('repeatCheck');
  const modalOverlay    = document.getElementById('modalOverlay');
  const modalClose      = document.getElementById('modalClose');
  const modalTitle      = document.getElementById('modalTitle');
  const modalBody       = document.getElementById('modalBody');

  // =====================================================================
  // テーマタグボタン
  // =====================================================================
  document.querySelectorAll('.theme-tag').forEach(btn => {
    btn.addEventListener('click', () => {
      themeInput.value = btn.dataset.theme;
    });
  });

  // =====================================================================
  // 英文生成
  // =====================================================================
  generateBtn.addEventListener('click', generateSentence);
  themeInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateSentence(); });

  function generateSentence() {
    const raw = themeInput.value.trim();
    let theme = null;
    let data = null;

    if (raw) {
      // 部分一致でテーマを探す
      const matched = THEMES.find(t => t.includes(raw) || raw.includes(t));
      if (matched) {
        theme = matched;
        data = DB[matched];
      } else {
        // マッチしない場合はランダム
        theme = THEMES[Math.floor(Math.random() * THEMES.length)];
        data = DB[theme];
        setStatus(`「${raw}」に近いテーマ「${theme}」から生成しました`);
      }
    } else {
      theme = THEMES[Math.floor(Math.random() * THEMES.length)];
      data = DB[theme];
    }

    // 同じテーマが連続しないよう履歴で除外（3件以上あれば）
    let candidates = data;
    if (history.length > 0) {
      const lastEn = history[history.length - 1].en;
      candidates = data.filter(d => d.en !== lastEn);
      if (candidates.length === 0) candidates = data;
    }

    const item = candidates[Math.floor(Math.random() * candidates.length)];
    currentSentence = { ...item, theme };

    renderSentence(currentSentence);
    renderChunks(currentSentence.chunks);
    renderLinkings(currentSentence.linkings);
    addHistory(currentSentence);
    stopSpeech();
    setStatus('');
  }

  // =====================================================================
  // 英文レンダリング（リンキング箇所をハイライト）
  // =====================================================================
  function renderSentence(item) {
    const { en, ja, linkings } = item;

    // リンキングフレーズをもとにハイライト
    let html = en;
    linkings.forEach(lk => {
      // フレーズをスペース区切りの単語列として扱い正規表現に変換
      const words = lk.display.split(' ');
      const pattern = words.map(w => escapeRegex(w)).join('[\\s\\-]+');
      const re = new RegExp(`(${pattern})`, 'gi');
      html = html.replace(re, (match) => {
        return `<span class="linking" data-key="${lk.phrase}" title="タップで解説">${match}</span>`;
      });
    });

    sentenceDisplay.innerHTML = `<span>${html}</span>`;
    jaTranslation.textContent = `🇯🇵 ${ja}`;

    // リンキングスパンにクリックイベント
    sentenceDisplay.querySelectorAll('.linking').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.key;
        const lk = linkings.find(l => l.phrase === key);
        if (lk) showModal(lk);
      });
    });
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // =====================================================================
  // チャンク表示
  // =====================================================================
  function renderChunks(chunks) {
    if (!chunks || chunks.length === 0) {
      chunkDisplay.innerHTML = '<div class="empty-state">チャンク情報なし</div>';
      return;
    }
    chunkDisplay.innerHTML = `<div class="chunks-list">${
      chunks.map(c => `<span class="chunk-badge">${c}</span>`).join('')
    }</div>`;
  }

  // =====================================================================
  // リンキング解説表示
  // =====================================================================
  function renderLinkings(linkings) {
    if (!linkings || linkings.length === 0) {
      linkingDisplay.innerHTML = '<div class="empty-state">リンキング情報なし</div>';
      return;
    }
    linkingDisplay.innerHTML = `<div class="linking-list">${
      linkings.map(lk => `
        <div class="linking-item">
          <div class="linking-phrase">🔗 ${lk.display}</div>
          <div class="linking-phonetic">${lk.phonetic}</div>
          <div class="linking-desc">${lk.desc}</div>
        </div>
      `).join('')
    }</div>`;
  }

  // =====================================================================
  // 履歴
  // =====================================================================
  function addHistory(item) {
    // 重複を除く
    history = history.filter(h => h.en !== item.en);
    history.unshift(item);
    if (history.length > 10) history = history.slice(0, 10);
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyDisplay.innerHTML = '<div class="empty-state">まだ履歴がありません</div>';
      return;
    }
    historyDisplay.innerHTML = `<div class="history-list">${
      history.map((h, i) => `
        <div class="history-item" data-idx="${i}">
          <span class="history-en">${h.en}</span>
          <span class="history-theme">${h.theme}</span>
        </div>
      `).join('')
    }</div>`;
    historyDisplay.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        currentSentence = history[idx];
        renderSentence(currentSentence);
        renderChunks(currentSentence.chunks);
        renderLinkings(currentSentence.linkings);
        stopSpeech();
        setStatus('');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // =====================================================================
  // モーダル（リンキング詳細）
  // =====================================================================
  function showModal(lk) {
    modalTitle.textContent = `🔗 ${lk.display}`;
    modalBody.innerHTML = `
      <p style="font-size:1.1rem;font-weight:700;color:#78350f;margin-bottom:8px;">${lk.phonetic}</p>
      <p style="font-size:0.95rem;line-height:1.7;">${lk.desc}</p>
    `;
    modalOverlay.classList.add('open');
  }
  modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });

  // =====================================================================
  // 音声再生（Web Speech API）
  // =====================================================================
  playBtn.addEventListener('click', toggleSpeech);

  function toggleSpeech() {
    if (speaking) {
      stopSpeech();
    } else {
      playSpeech();
    }
  }

  function playSpeech() {
    if (!currentSentence) {
      setStatus('まず英文を生成してください');
      return;
    }
    if (!window.speechSynthesis) {
      setStatus('このブラウザは音声合成に対応していません');
      return;
    }

    window.speechSynthesis.cancel();
    utterance = new SpeechSynthesisUtterance(currentSentence.en);
    utterance.lang = 'en-US';
    utterance.rate = parseFloat(speedSlider.value);

    // 英語音声を優先的に選択
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                   voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utterance.voice = enVoice;

    utterance.onstart = () => {
      speaking = true;
      playBtn.textContent = '⏹';
      setStatus('<span class="loading"></span> 再生中...');
    };
    utterance.onend = () => {
      speaking = false;
      playBtn.textContent = '▶';
      setStatus('再生完了');
      if (repeatCheck.checked) {
        setTimeout(() => playSpeech(), 800);
      }
    };
    utterance.onerror = (e) => {
      speaking = false;
      playBtn.textContent = '▶';
      setStatus('音声再生エラー: ' + e.error);
    };

    window.speechSynthesis.speak(utterance);
  }

  function stopSpeech() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    speaking = false;
    playBtn.textContent = '▶';
    setStatus('');
  }

  // スピードスライダー
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(1) + '×';
    if (speaking) {
      stopSpeech();
      setTimeout(playSpeech, 100);
    }
  });

  // リピートチェック
  repeatCheck.addEventListener('change', () => {
    repeatMode = repeatCheck.checked;
  });

  // =====================================================================
  // ユーティリティ
  // =====================================================================
  function setStatus(msg) {
    statusBar.innerHTML = msg;
  }

  // 音声リスト読み込み待ち
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
  </script>
</body>
</html>
