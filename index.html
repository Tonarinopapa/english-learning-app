<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英語チャンク学習アプリ</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --linking-bg: #fef3c7;
      --linking-border: #f59e0b;
      --linking-text: #92400e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 760px;
      margin: 0 auto 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    /* テーマ入力 */
    .theme-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .theme-input {
      flex: 1;
      min-width: 180px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .theme-input:focus { border-color: var(--primary); }
    .theme-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .theme-tag {
      background: #ede9fe;
      color: var(--primary);
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .theme-tag:hover { background: #c7d2fe; }
    /* ボタン */
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text);
    }
    .btn-secondary:hover { background: #e2e8f0; }
    /* 英文表示エリア */
    .sentence-area {
      font-size: 1.35rem;
      line-height: 1.9;
      letter-spacing: 0.01em;
      min-height: 60px;
      padding: 4px 0;
    }
    .sentence-area .word { display: inline; }
    /* リンキングハイライト */
    .linking {
      background: var(--linking-bg);
      border-bottom: 2px solid var(--linking-border);
      color: var(--linking-text);
      border-radius: 3px;
      padding: 0 2px;
      cursor: pointer;
      position: relative;
      font-weight: 600;
    }
    .ja-translation {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
      line-height: 1.6;
    }
    /* チャンク解説 */
    .chunks-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .chunk-badge {
      background: #ede9fe;
      color: var(--primary);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    /* リンキング解説カード */
    .linking-list { display: flex; flex-direction: column; gap: 10px; }
    .linking-item {
      background: var(--linking-bg);
      border-left: 4px solid var(--linking-border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .linking-item .linking-phrase {
      font-size: 1rem;
      font-weight: 700;
      color: var(--linking-text);
      margin-bottom: 3px;
    }
    .linking-item .linking-phonetic {
      font-size: 0.85rem;
      color: #78350f;
      margin-bottom: 2px;
    }
    .linking-item .linking-desc {
      font-size: 0.85rem;
      color: var(--text);
    }
    /* プレーヤー */
    .player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .play-btn:hover { background: #4338ca; }
    .play-btn:active { transform: scale(0.93); }
    .speed-group {
      display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px;
    }
    .speed-label {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex; justify-content: space-between;
    }
    .speed-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
    }
    .repeat-group {
      display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--muted);
    }
    .repeat-group input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    /* ステータス */
    .status-bar {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 20px;
    }
    /* ローディング */
    .loading {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 24px 0;
      font-size: 0.95rem;
    }
    /* 履歴 */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: #ede9fe; }
    .history-en { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .history-theme {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    /* モーダル */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 { font-size: 1rem; margin-bottom: 12px; color: var(--primary); }
    .modal-close {
      float: right; background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: var(--muted); margin-top: -4px;
    }
    @media (max-width: 500px) {
      .sentence-area { font-size: 1.1rem; }
      h1 { font-size: 1.3rem; }
    }

    /* ===== 会話練習 ===== */
    .conv-pattern-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .conv-tag {
      background: #d1fae5;
      color: #065f46;
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .conv-tag:hover { background: #a7f3d0; }
    .conv-tag.active { background: #059669; color: #fff; }
    .conv-lines { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .conv-line {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
    }
    .conv-line.speaker-a { background: #f0f9ff; }
    .conv-line.speaker-b { background: #fdf4ff; }
    .conv-line.playing {
      background: #ede9fe;
      border-color: var(--primary);
    }
    .conv-speaker {
      font-weight: 700;
      font-size: 0.85rem;
      min-width: 24px;
      padding-top: 2px;
      color: var(--muted);
    }
    .conv-speaker.a { color: #0369a1; }
    .conv-speaker.b { color: #7c3aed; }
    .conv-text-block { flex: 1; }
    .conv-en {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
    }
    .conv-ja {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .conv-chunks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .conv-chunk-badge {
      background: #d1fae5;
      color: #065f46;
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .conv-player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .conv-play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #059669;
      color: #fff;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .conv-play-btn:hover { background: #047857; }
    .conv-play-btn:active { transform: scale(0.93); }
    .conv-status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 20px;
      margin-top: 8px;
    }
    .conv-repeat-group {
      display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--muted);
    }
    .conv-repeat-group input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🗣 英語チャンク学習アプリ</h1>
  <p class="subtitle">代表的なチャンク × リンキングで自然な英語を身につけよう</p>

  <!-- テーマ設定 -->
  <div class="card">
    <div class="section-title">テーマ（空欄でランダム）</div>
    <div class="theme-row">
      <input class="theme-input" id="themeInput" type="text" placeholder="例：カフェ、空港、ビジネス会議…" />
      <button class="btn btn-primary" id="generateBtn">✨ 英文を生成</button>
    </div>
    <div class="theme-tags" id="themeTags">
      <button class="theme-tag" data-theme="カフェ">☕ カフェ</button>
      <button class="theme-tag" data-theme="空港">✈️ 空港</button>
      <button class="theme-tag" data-theme="ショッピング">🛍 ショッピング</button>
      <button class="theme-tag" data-theme="ビジネス会議">💼 ビジネス会議</button>
      <button class="theme-tag" data-theme="レストラン">🍽 レストラン</button>
      <button class="theme-tag" data-theme="ホテル">🏨 ホテル</button>
      <button class="theme-tag" data-theme="日常会話">💬 日常会話</button>
      <button class="theme-tag" data-theme="医療・病院">🏥 医療</button>
      <button class="theme-tag" data-theme="観光">🗺 観光</button>
      <button class="theme-tag" data-theme="スラング">🤙 スラング</button>
    </div>
  </div>

  <!-- 英文表示 -->
  <div class="card" id="sentenceCard">
    <div class="section-title">生成された英文</div>
    <div class="sentence-area" id="sentenceDisplay">
      <div class="empty-state">上のボタンで英文を生成してください</div>
    </div>
    <div class="ja-translation" id="jaTranslation"></div>
  </div>

  <!-- 音声プレーヤー -->
  <div class="card">
    <div class="section-title">音声再生</div>
    <div class="player-row">
      <button class="play-btn" id="playBtn" title="再生">▶</button>
      <div class="speed-group">
        <div class="speed-label">
          <span>スピード</span>
          <span id="speedVal">1.0×</span>
        </div>
        <input class="speed-slider" id="speedSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
      <div class="repeat-group">
        <input type="checkbox" id="repeatCheck" />
        <label for="repeatCheck">リピート再生</label>
      </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <!-- チャンク解説 -->
  <div class="card" id="chunkCard">
    <div class="section-title">使われているチャンク</div>
    <div id="chunkDisplay">
      <div class="empty-state">英文を生成するとチャンクが表示されます</div>
    </div>
  </div>

  <!-- リンキング解説 -->
  <div class="card" id="linkingCard">
    <div class="section-title">🔗 リンキング解説</div>
    <div id="linkingDisplay">
      <div class="empty-state">英文を生成するとリンキング解説が表示されます</div>
    </div>
  </div>

  <!-- 生成履歴 -->
  <div class="card">
    <div class="section-title">📚 生成履歴（クリックで再表示）</div>
    <div id="historyDisplay">
      <div class="empty-state">まだ履歴がありません</div>
    </div>
  </div>

  <!-- 会話練習 -->
  <div class="card" id="convCard">
    <div class="section-title">💬 会話練習（チャンクを使った短い会話を聴こう）</div>
    <div class="conv-pattern-tags" id="convTags"></div>
    <div class="conv-lines" id="convLines">
      <div class="empty-state">上のボタンで会話パターンを選んでください</div>
    </div>
    <div class="conv-player-row">
      <button class="conv-play-btn" id="convPlayBtn" title="再生">▶</button>
      <div class="speed-group">
        <div class="speed-label">
          <span>スピード</span>
          <span id="convSpeedVal">1.0×</span>
        </div>
        <input class="speed-slider" id="convSpeedSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>
      <div class="conv-repeat-group">
        <input type="checkbox" id="convRepeatCheck" />
        <label for="convRepeatCheck">リピート再生</label>
      </div>
    </div>
    <div class="conv-status" id="convStatus"></div>
  </div>

  <!-- リンキング詳細モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
  // =====================================================================
  // データ定義 ー テーマ別チャンク英文データベース
  // =====================================================================
  const DB = {
    "カフェ": [
      {
        en: "I'd like to have a cup of coffee, please.",
        ja: "コーヒーを一杯いただけますか。",
        chunks: ["I'd like to ~", "a cup of ~"],
        linkings: [
          { phrase: "like_to", display: "like to", phonetic: "/laɪktə/", desc: "「like」の末尾 /k/ と「to」の /t/ が続き、/laɪktə/ のように /k/ が /t/ に吸収されて滑らかにつながる。" },
          { phrase: "cup_of", display: "cup of", phonetic: "/kʌpəv/", desc: "「cup」の語末 /p/ と「of」の /ə/ がつながり、/kʌpəv/ と一息で発音される。" }
        ]
      },
      {
        en: "Can I get a latte to go, please?",
        ja: "ラテをテイクアウトでいただけますか。",
        chunks: ["Can I get ~", "to go"],
        linkings: [
          { phrase: "get_a", display: "get a", phonetic: "/ɡetə/", desc: "「get」末尾 /t/ と「a」弱形 /ə/ が連結して /ɡetə/ となる。" },
          { phrase: "to_go", display: "to go", phonetic: "/təɡoʊ/", desc: "「to」弱形 /tə/ と「go」/ɡoʊ/ がつながり /təɡoʊ/ となる。" }
        ]
      },
      {
        en: "What kind of coffee do you have?",
        ja: "どんな種類のコーヒーがありますか。",
        chunks: ["What kind of ~", "do you have"],
        linkings: [
          { phrase: "kind_of", display: "kind of", phonetic: "/kaɪndəv/", desc: "「kind」末尾 /d/ と「of」弱形 /əv/ が連結して /kaɪndəv/ と聞こえる。" },
          { phrase: "do_you", display: "do you", phonetic: "/dʒə/", desc: "「do」の /d/ と「you」の /j/ が融合して /dʒ/（口蓋化同化）→ /dʒə/。" }
        ]
      },
      {
        en: "I'd like to add some milk, please.",
        ja: "ミルクを少し追加していただけますか。",
        chunks: ["I'd like to ~", "add some ~"],
        linkings: [
          { phrase: "like_to", display: "like to", phonetic: "/laɪktə/", desc: "「like」末尾 /k/ と「to」弱形 /tə/ が連なり /laɪktə/ となる。" },
          { phrase: "add_some", display: "add some", phonetic: "/ædsʌm/", desc: "「add」末尾 /d/ と「some」の /s/ が連なり /ædsʌm/ となる。" }
        ]
      },
      {
        en: "Do you have any decaf options?",
        ja: "カフェインレスの選択肢はありますか。",
        chunks: ["Do you have ~", "any ~"],
        linkings: [
          { phrase: "have_any", display: "have any", phonetic: "/hævəni/", desc: "「have」末尾 /v/ と「any」の /ə/ が連結して /hævəni/ となる。" },
          { phrase: "do_you", display: "do you", phonetic: "/dʒə/", desc: "「do」/d/ と「you」/j/ が融合して /dʒ/ となる（口蓋化同化）。" }
        ]
      },
      {
        en: "Could I get a refill, please?",
        ja: "おかわりをいただけますか。",
        chunks: ["Could I get ~", "a refill"],
        linkings: [
          { phrase: "Could_I", display: "Could I", phonetic: "/kʊdaɪ/", desc: "「Could」末尾 /d/ と「I」/aɪ/ が連結して /kʊdaɪ/ と流れる。" },
          { phrase: "get_a", display: "get a", phonetic: "/ɡetə/", desc: "「get」末尾 /t/ と「a」弱形 /ə/ が連結して /ɡetə/ となる。" }
        ]
      },
      {
        en: "How much is a large cappuccino?",
        ja: "ラージサイズのカプチーノはいくらですか。",
        chunks: ["How much is ~", "a large ~"],
        linkings: [
          { phrase: "much_is", display: "much is", phonetic: "/mʌtʃɪz/", desc: "「much」末尾 /tʃ/ と「is」弱形 /ɪz/ が連結して /mʌtʃɪz/ となる。" },
          { phrase: "is_a", display: "is a", phonetic: "/ɪzə/", desc: "「is」末尾 /z/ と「a」弱形 /ə/ が連結して /ɪzə/ と聞こえる。" }
        ]
      },
      {
        en: "Is there anything sweet on the menu?",
        ja: "メニューに甘いものはありますか。",
        chunks: ["Is there ~", "on the menu"],
        linkings: [
          { phrase: "there_anything", display: "there anything", phonetic: "/ðerɪniθɪŋ/", desc: "「there」末尾 /r/ と「anything」の /ə/ がつながり /ðerɪniθɪŋ/ と流れる。" },
          { phrase: "on_the", display: "on the", phonetic: "/ɒnðə/", desc: "「on」末尾 /n/ と「the」弱形 /ðə/ がつながって /ɒnðə/ となる。" }
        ]
      },
      {
        en: "I'll have the same as him, please.",
        ja: "彼と同じものをお願いします。",
        chunks: ["I'll have ~", "the same as ~"],

  themeInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateSentence(); });

  function generateSentence() {
    const raw = themeInput.value.trim();
    let theme = null;
    let data = null;

    if (raw) {
      // 部分一致でテーマを探す
      const matched = THEMES.find(t => t.includes(raw) || raw.includes(t));
      if (matched) {
        theme = matched;
        data = DB[matched];
      } else {
        // マッチしない場合はランダム
        theme = THEMES[Math.floor(Math.random() * THEMES.length)];
        data = DB[theme];
        setStatus(`「${raw}」に近いテーマ「${theme}」から生成しました`);
      }
    } else {
      theme = THEMES[Math.floor(Math.random() * THEMES.length)];
      data = DB[theme];
    }

    // 同じテーマが連続しないよう履歴で除外（3件以上あれば）
    let candidates = data;
    if (history.length > 0) {
      const lastEn = history[history.length - 1].en;
      candidates = data.filter(d => d.en !== lastEn);
      if (candidates.length === 0) candidates = data;
    }

    const item = candidates[Math.floor(Math.random() * candidates.length)];
    currentSentence = { ...item, theme };

    renderSentence(currentSentence);
    renderChunks(currentSentence.chunks);
    renderLinkings(currentSentence.linkings);
    addHistory(currentSentence);
    stopSpeech();
    setStatus('');
  }

  // =====================================================================
  // 英文レンダリング（リンキング箇所をハイライト）
  // =====================================================================
  function renderSentence(item) {
    const { en, ja, linkings } = item;

    // リンキングフレーズをもとにハイライト
    let html = en;
    linkings.forEach(lk => {
      // フレーズをスペース区切りの単語列として扱い正規表現に変換
      const words = lk.display.split(' ');
      const pattern = words.map(w => escapeRegex(w)).join('[\\s\\-]+');
      const re = new RegExp(`(${pattern})`, 'gi');
      html = html.replace(re, (match) => {
        return `<span class="linking" data-key="${lk.phrase}" title="タップで解説">${match}</span>`;
      });
    });

    sentenceDisplay.innerHTML = `<span>${html}</span>`;
    jaTranslation.textContent = `🇯🇵 ${ja}`;

    // リンキングスパンにクリックイベント
    sentenceDisplay.querySelectorAll('.linking').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.key;
        const lk = linkings.find(l => l.phrase === key);
        if (lk) showModal(lk);
      });
    });
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // =====================================================================
  // チャンク表示
  // =====================================================================
  function renderChunks(chunks) {
    if (!chunks || chunks.length === 0) {
      chunkDisplay.innerHTML = '<div class="empty-state">チャンク情報なし</div>';
      return;
    }
    chunkDisplay.innerHTML = `<div class="chunks-list">${
      chunks.map(c => `<span class="chunk-badge">${c}</span>`).join('')
    }</div>`;
  }

  // =====================================================================
  // リンキング解説表示
  // =====================================================================
  function renderLinkings(linkings) {
    if (!linkings || linkings.length === 0) {
      linkingDisplay.innerHTML = '<div class="empty-state">リンキング情報なし</div>';
      return;
    }
    linkingDisplay.innerHTML = `<div class="linking-list">${
      linkings.map(lk => `
        <div class="linking-item">
          <div class="linking-phrase">🔗 ${lk.display}</div>
          <div class="linking-phonetic">${lk.phonetic}</div>
          <div class="linking-desc">${lk.desc}</div>
        </div>
      `).join('')
    }</div>`;
  }

  // =====================================================================
  // 履歴
  // =====================================================================
  function addHistory(item) {
    // 重複を除く
    history = history.filter(h => h.en !== item.en);
    history.unshift(item);
    if (history.length > 10) history = history.slice(0, 10);
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyDisplay.innerHTML = '<div class="empty-state">まだ履歴がありません</div>';
      return;
    }
    historyDisplay.innerHTML = `<div class="history-list">${
      history.map((h, i) => `
        <div class="history-item" data-idx="${i}">
          <span class="history-en">${h.en}</span>
          <span class="history-theme">${h.theme}</span>
        </div>
      `).join('')
    }</div>`;
    historyDisplay.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        currentSentence = history[idx];
        renderSentence(currentSentence);
        renderChunks(currentSentence.chunks);
        renderLinkings(currentSentence.linkings);
        stopSpeech();
        setStatus('');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // =====================================================================
  // モーダル（リンキング詳細）
  // =====================================================================
  function showModal(lk) {
    modalTitle.textContent = `🔗 ${lk.display}`;
    modalBody.innerHTML = `
      <p style="font-size:1.1rem;font-weight:700;color:#78350f;margin-bottom:8px;">${lk.phonetic}</p>
      <p style="font-size:0.95rem;line-height:1.7;">${lk.desc}</p>
    `;
    modalOverlay.classList.add('open');
  }
  modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });

  // =====================================================================
  // 音声再生（Web Speech API）
  // =====================================================================
  playBtn.addEventListener('click', toggleSpeech);

  function toggleSpeech() {
    if (speaking) {
      stopSpeech();
    } else {
      playSpeech();
    }
  }

  function playSpeech() {
    if (!currentSentence) {
      setStatus('まず英文を生成してください');
      return;
    }
    if (!window.speechSynthesis) {
      setStatus('このブラウザは音声合成に対応していません');
      return;
    }

    window.speechSynthesis.cancel();
    utterance = new SpeechSynthesisUtterance(currentSentence.en);
    utterance.lang = 'en-US';
    utterance.rate = parseFloat(speedSlider.value);

    // 英語音声を優先的に選択
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                   voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utterance.voice = enVoice;

    utterance.onstart = () => {
      speaking = true;
      playBtn.textContent = '⏹';
      setStatus('<span class="loading"></span> 再生中...');
    };
    utterance.onend = () => {
      speaking = false;
      playBtn.textContent = '▶';
      setStatus('再生完了');
      if (repeatCheck.checked) {
        setTimeout(() => playSpeech(), 800);
      }
    };
    utterance.onerror = (e) => {
      speaking = false;
      playBtn.textContent = '▶';
      setStatus('音声再生エラー: ' + e.error);
    };

    window.speechSynthesis.speak(utterance);
  }

  function stopSpeech() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    speaking = false;
    playBtn.textContent = '▶';
    setStatus('');
  }

  // スピードスライダー
  speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(1) + '×';
    if (speaking) {
      stopSpeech();
      setTimeout(playSpeech, 100);
    }
  });

  // リピートチェック
  repeatCheck.addEventListener('change', () => {
    repeatMode = repeatCheck.checked;
  });

  // =====================================================================
  // ユーティリティ
  // =====================================================================
  function setStatus(msg) {
    statusBar.innerHTML = msg;
  }

  // 音声リスト読み込み待ち
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }

        { speaker: "A", en: "Front desk, how may I help you?", ja: "フロントデスクです。どのようなご用件でしょうか？" },
        { speaker: "B", en: "Hi, I'm afraid there's an issue with the air conditioning in my room.", ja: "こんにちは、部屋のエアコンに問題があるようで。" },
        { speaker: "A", en: "I'm sorry to hear that. What room are you in?", ja: "それは申し訳ございません。何号室でしょうか？" },
        { speaker: "B", en: "Room 412. Could you please send someone to take a look?", ja: "412号室です。誰かに見に来てもらえますか？" },
        { speaker: "A", en: "Absolutely. I'll send maintenance right up. Is there anything else?", ja: "もちろんです。すぐにメンテナンスを向かわせます。他に何かありますか？" },
        { speaker: "B", en: "I'd appreciate it if you could also provide extra blankets in the meantime.", ja: "その間に毛布を追加でいただけると助かります。" }
      ]
    },
    {
      id: "coffee_order_detail",
      title: "☕ こだわりのコーヒー注文",
      chunks: ["Could I get ~", "Can you make it ~", "Is that made with ~"],
      lines: [
        { speaker: "A", en: "Hi, what can I get started for you?", ja: "こんにちは、何をお作りしましょうか？" },
        { speaker: "B", en: "Could I get a flat white, please? Medium size.", ja: "フラットホワイトをお願いします。ミディアムサイズで。" },
        { speaker: "A", en: "Of course! Any milk preference?", ja: "もちろんです！ミルクのご希望は？" },
        { speaker: "B", en: "Oat milk if possible. Can you make it extra hot?", ja: "できればオーツミルクで。特に熱めにしていただけますか？" },
        { speaker: "A", en: "Sure! Is that with one or two shots of espresso?", ja: "もちろんです！エスプレッソは1ショットですか、2ショットですか？" },
        { speaker: "B", en: "Two shots, please. Oh, and is that made with fair-trade beans?", ja: "2ショットでお願いします。あとフェアトレードの豆を使っていますか？" }
      ]
    },
    {
      id: "moving_day",
      title: "📦 引っ越しの日",
      chunks: ["Could you give me a hand with ~", "Where would you like ~", "I really appreciate ~"],
      lines: [
        { speaker: "A", en: "Hey! I'm so glad you could come and help me move.", ja: "来てくれて本当によかった。引っ越しを手伝ってくれてありがとう。" },
        { speaker: "B", en: "Of course! What do you need first?", ja: "もちろんだよ！まず何が必要？" },
        { speaker: "A", en: "Could you give me a hand with this sofa? It's really heavy.", ja: "このソファを持つのを手伝ってもらえる？すごく重いんだ。" },
        { speaker: "B", en: "Sure. Where would you like it in the new place?", ja: "いいよ。新しい家のどこに置く？" },
        { speaker: "A", en: "Against the far wall, facing the TV. Is that okay?", ja: "奥の壁に、テレビの方を向くようにして。それで大丈夫？" },
        { speaker: "B", en: "No problem. I really appreciate you buying us pizza later!", ja: "大丈夫だよ。後でピザ買ってくれるのを楽しみにしてるからね！" }
      ]
    },
    {
      id: "school_parent",
      title: "🏫 保護者面談",
      chunks: ["I was hoping to discuss ~", "How is ~ doing ~", "Is there anything I can do ~"],
      lines: [
        { speaker: "A", en: "Good afternoon. Please take a seat. I was hoping to discuss Tommy's progress.", ja: "こんにちは。座ってください。トミーの進歩についてお話ししたいと思っていました。" },
        { speaker: "B", en: "Thank you. How is he doing in class overall?", ja: "ありがとうございます。授業全般でどうですか？" },
        { speaker: "A", en: "He's doing well in math and science. Reading has been more of a challenge lately.", ja: "数学と理科はよくできています。読書は最近少し苦労しています。" },
        { speaker: "B", en: "I see. Is there anything I can do at home to help?", ja: "そうですか。家でできることは何かありますか？" },
        { speaker: "A", en: "Reading together every evening would make a big difference.", ja: "毎晩一緒に本を読むと大きな効果があります。" },
        { speaker: "B", en: "We'll start right away. Thank you for letting me know.", ja: "すぐに始めます。教えていただきありがとうございます。" }
      ]
    }
  ];

  // =====================================================================
  // 会話練習 ロジック
  // =====================================================================
  const convPlayBtn    = document.getElementById('convPlayBtn');
  const convSpeedSlider = document.getElementById('convSpeedSlider');
  const convSpeedVal   = document.getElementById('convSpeedVal');
  const convStatus     = document.getElementById('convStatus');
  const convLines      = document.getElementById('convLines');
  const convRepeatCheck = document.getElementById('convRepeatCheck');
  const convTagsEl     = document.getElementById('convTags');

  let currentConv = null;
  let convLineIndex = 0;
  let convPlaying = false;
  let convRepeat = false;

  // パターンタグボタンを生成
  CONV_DB.forEach(conv => {
    const btn = document.createElement('button');
    btn.className = 'conv-tag';
    btn.textContent = conv.title;
    btn.dataset.id = conv.id;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.conv-tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      stopConv();
      loadConv(conv);
    });
    convTagsEl.appendChild(btn);
  });

  function loadConv(conv) {
    currentConv = conv;
    convLineIndex = 0;
    convLines.innerHTML = '';
    conv.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'conv-line speaker-' + line.speaker.toLowerCase();
      div.id = 'conv-line-' + i;
      div.innerHTML =
        '<span class="conv-speaker ' + line.speaker.toLowerCase() + '">' + line.speaker + '</span>' +
        '<div class="conv-text-block">' +
          '<div class="conv-en">' + line.en + '</div>' +
          '<div class="conv-ja">' + line.ja + '</div>' +
        '</div>';
      convLines.appendChild(div);
    });
    // チャンク表示
    if (conv.chunks && conv.chunks.length) {
      const chunkDiv = document.createElement('div');
      chunkDiv.className = 'conv-chunks';
      conv.chunks.forEach(c => {
        const span = document.createElement('span');
        span.className = 'conv-chunk-badge';
        span.textContent = c;
        chunkDiv.appendChild(span);
      });
      convLines.appendChild(chunkDiv);
    }
    convStatus.textContent = '会話パターンを選択しました。▶ で再生';
  }

  function highlightConvLine(index) {
    document.querySelectorAll('.conv-line').forEach((el, i) => {
      el.classList.toggle('playing', i === index);
    });
    const el = document.getElementById('conv-line-' + index);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function playConvFrom(index) {
    if (!currentConv) return;
    if (index >= currentConv.lines.length) {
      document.querySelectorAll('.conv-line').forEach(el => el.classList.remove('playing'));
      if (convRepeat) {
        convLineIndex = 0;
        setTimeout(() => playConvFrom(0), 600);
      } else {
        convPlaying = false;
        convPlayBtn.textContent = '▶';
        convStatus.textContent = '再生完了';
      }
      return;
    }
    convLineIndex = index;
    highlightConvLine(index);
    const line = currentConv.lines[index];
    convStatus.textContent = line.speaker + ': ' + line.en;
    const utt = new SpeechSynthesisUtterance(line.en);
    utt.rate = parseFloat(convSpeedSlider.value);
    utt.lang = 'en-US';

    // スピーカーに応じて声を切り替える
    const voices = window.speechSynthesis.getVoices();
    const enVoices = voices.filter(v => v.lang.startsWith('en'));
    if (enVoices.length >= 2) {
      const femaleVoice = enVoices.find(v =>
        /female|samantha|zira|karen|moira|victoria|allison|ava|fiona/i.test(v.name)
      ) || enVoices[0];
      const maleVoice = enVoices.find(v =>
        /male|daniel|david|alex|fred|james|tom|arthur|lee|oliver|mark/i.test(v.name)
      ) || enVoices.find(v => v !== femaleVoice) || enVoices[1] || enVoices[0];
      utt.voice = line.speaker === 'A' ? femaleVoice : maleVoice;
    }

    utt.onend = () => {
      if (!convPlaying) return;
      const nextLine = currentConv.lines[index + 1];
      const sameSpeaker = nextLine && nextLine.speaker === line.speaker;
      const gap = sameSpeaker ? 80 : 180;
      setTimeout(() => playConvFrom(index + 1), gap);
    };
    window.speechSynthesis.speak(utt);
  }

  function stopConv() {
    convPlaying = false;
    window.speechSynthesis.cancel();
    convPlayBtn.textContent = '▶';
    document.querySelectorAll('.conv-line').forEach(el => el.classList.remove('playing'));
    convStatus.textContent = '';
  }

  convPlayBtn.addEventListener('click', () => {
    if (!currentConv) {
      convStatus.textContent = '会話パターンを先に選択してください';
      return;
    }
    if (convPlaying) {
      stopConv();
    } else {
      convPlaying = true;
      convPlayBtn.textContent = '⏸';
      playConvFrom(convLineIndex);
    }
  });

  convSpeedSlider.addEventListener('input', () => {
    convSpeedVal.textContent = parseFloat(convSpeedSlider.value).toFixed(1) + '×';
  });

  convRepeatCheck.addEventListener('change', () => {
    convRepeat = convRepeatCheck.checked;
  });
  </script>
</body>
</html>
